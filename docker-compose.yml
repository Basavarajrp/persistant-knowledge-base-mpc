version: '3.8'

services:
  neo4j:
    image: neo4j:5.26
    container_name: knowledge-graph-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser → http://localhost:7474
      - "7687:7687"   # Bolt URI      → bolt://localhost:7687
    environment:
      # NEO4J_PASSWORD is substituted from .env by Docker Compose automatically
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}

      # Plugins and Security
      - NEO4J_PLUGINS=["apoc"]                  # required for vector index procedures
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local